# ===============================
# APPLICATION SETTINGS
# ===============================
spring.application.name=exam-portal-server
# Render will automatically assign a port, but 8080 is the local default
server.port=${PORT:8080}

# ===============================
# DATASOURCE (POSTGRESQL)
# ===============================
# These variables will be filled by Render in production
# and by your System Variables during local testing
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
# 'update' ensures your tables (students, exams, etc.) are created automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable 'open-in-view' to avoid the warning in your logs
spring.jpa.open-in-view=false